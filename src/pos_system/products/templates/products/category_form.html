{% extends 'public/base.html' %}

{% block title %}{{ page_title }} - 零售店POS系统{% endblock %}

{% block content %}
<!-- 页面标题 -->
<div class="page-header">
    <h1 class="page-title">{{ page_title }}</h1>
    <div class="page-actions">
        <a href="{% url 'products:product_categories' %}" class="btn-back">
            <i class="bi bi-arrow-left"></i>
            返回列表
        </a>
    </div>
</div>

<!-- 内容区域 -->
<div class="card">
    <div class="card-body">
        {% if error %}
        <div class="alert alert-danger">
            <i class="bi bi-exclamation-triangle-fill"></i>
            {{ error }}
        </div>
        {% endif %}

        <form method="post" class="category-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="name" class="form-label">
                    <span class="required">*</span>
                    分类名称
                </label>
                <input type="text" 
                       id="name" 
                       name="name" 
                       class="form-control" 
                       placeholder="请输入分类名称"
                       value="{% if form_data.name %}{{ form_data.name }}{% elif category %}{{ category.name }}{% endif %}"
                       required>
            </div>

            <div class="form-group">
                <label for="parent_id" class="form-label">
                    父分类
                </label>
                <select id="parent_id" name="parent_id" class="form-select">
                    <option value="">-- 无（作为一级分类）--</option>
                    {% for cat in all_categories %}
                        {% if not category or cat.id != category.id %}
                            <option value="{{ cat.id }}" 
                                    {% if form_data.parent_id == cat.id|stringformat:"s" or category.parent_id == cat.id %}selected{% endif %}
                                    data-level="{{ cat.level }}">
                                {{ cat.name }} ({{ cat.level }}级)
                            </option>
                        {% endif %}
                    {% endfor %}
                </select>
                <small class="form-text">选择父分类后，当前分类将成为其子分类</small>
            </div>

            <div class="form-group">
                <label for="sort_order" class="form-label">
                    排序序号
                </label>
                <input type="number" 
                       id="sort_order" 
                       name="sort_order" 
                       class="form-control" 
                       placeholder="请输入排序序号（数字越小越靠前）"
                       value="{% if form_data.sort_order %}{{ form_data.sort_order }}{% elif category %}{{ category.sort_order }}{% else %}0{% endif %}">
                <small class="form-text">数字越小，排序越靠前</small>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">
                    <i class="bi bi-check-lg"></i>
                    保存
                </button>
                <a href="{% url 'products:product_categories' %}" class="btn-secondary">
                    <i class="bi bi-x-lg"></i>
                    取消
                </a>
            </div>
        </form>
    </div>
</div>

<style>
/* 页面标题 */
.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.page-title {
    font-size: 20px;
    font-weight: 600;
    color: #2c3e50;
    margin: 0;
}

.page-actions {
    display: flex;
    gap: 10px;
}

.btn-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: #f8f9fa;
    color: #6c757d;
    border: 1px solid #dee2e6;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
    transition: all 0.2s;
}

.btn-back:hover {
    background: #e9ecef;
    color: #495057;
}

/* 卡片样式 */
.card {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    border: 1px solid #e8f1f8;
}

.card-body {
    padding: 24px;
}

/* 警告框 */
.alert {
    padding: 12px 16px;
    border-radius: 6px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.alert-danger {
    background: #fff5f5;
    color: #c53030;
    border: 1px solid #feb2b2;
}

/* 表单样式 */
.category-form {
    max-width: 600px;
}

.form-group {
    margin-bottom: 20px;
}

.form-label {
    display: block;
    font-weight: 500;
    color: #4a5568;
    margin-bottom: 8px;
    font-size: 14px;
}

.form-label .required {
    color: #e53e3e;
    margin-right: 4px;
}

.form-control,
.form-select {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #d6e8ff;
    border-radius: 6px;
    font-size: 14px;
    color: #2d3748;
    background: #fff;
    transition: all 0.2s;
    box-sizing: border-box;
}

.form-control:focus,
.form-select:focus {
    outline: none;
    border-color: #4a90e2;
    box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
}

.form-text {
    display: block;
    margin-top: 6px;
    font-size: 12px;
    color: #718096;
}

/* 按钮样式 */
.form-actions {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #e8f1f8;
}

.btn-primary,
.btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
}

.btn-primary {
    background: #4a90e2;
    color: white;
}

.btn-primary:hover {
    background: #357abd;
}

.btn-secondary {
    background: #f8f9fa;
    color: #6c757d;
    border: 1px solid #dee2e6;
}

.btn-secondary:hover {
    background: #e9ecef;
    color: #495057;
}
</style>
{% endblock %}
