// 热销商品 TOP10
function initHotProductsChart(period = 'day') {
    var chart = echarts.init(document.getElementById('hotProductsChart'));
    
    // 先清空图表
    chart.clear();
    
    // 通过AJAX获取数据
    $.ajax({
        url: '/reports/api/hot-products/',
        type: 'GET',
        data: { period: period },
        success: function(response) {
            if (response.code === '1') {
                var data = response.data;
                
                // 检查是否有数据
                var hasData = data.product_names && data.product_names.length > 0 && data.quantities && data.quantities.some(function(val) { return val > 0; });
                
                if (!hasData) {
                    showEmptyChart(chart, '暂无热销商品数据');
                    return;
                }
                
                var option = {
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: {
                            type: 'shadow'
                        }
                    },
                    grid: {
                        left: '3%',
                        right: '4%',
                        bottom: '3%',
                        containLabel: true
                    },
                    xAxis: {
                        type: 'category',
                        data: data.product_names,
                        axisLabel: {
                            rotate: 45,
                            interval: 0
                        }
                    },
                    yAxis: {
                        type: 'value',
                        name: '销量'
                    },
                    series: [{
                        name: '销量',
                        type: 'bar',
                        data: data.quantities,
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                {offset: 0, color: '#667eea'},
                                {offset: 1, color: '#764ba2'}
                            ])
                        }
                    }]
                };
                
                chart.setOption(option);
            }
        },
        error: function() {
            console.error('获取热销商品数据失败');
        }
    });
    
    // 响应式
    window.addEventListener('resize', function() {
        chart.resize();
    });
}

// 切换热销商品周期
function changeHotProductsPeriod(period, event) {
    // 更新按钮状态
    event.target.parentElement.querySelectorAll('.btn-outline-custom').forEach(btn => {
        btn.classList.remove('active');
    });
    event.target.classList.add('active');
    
    // 重新初始化图表
    initHotProductsChart(period);
}

// 趋势分析图表
function initTrendChart(period) {
    var chart = echarts.init(document.getElementById('trendChart'));
    
    // 先清空图表
    chart.clear();
    
    // 通过AJAX获取数据
    $.ajax({
        url: '/reports/api/trend/',
        type: 'GET',
        data: { period: period },
        success: function(response) {
            if (response.code === '1') {
                var data = response.data;
                
                // 检查是否有数据
                var hasData = (data.current_data && data.current_data.some(function(val) { return val > 0; })) ||
                              (data.last_period_data && data.last_period_data.some(function(val) { return val > 0; }));
                
                if (!hasData) {
                    showEmptyChart(chart, '暂无趋势数据');
                    return;
                }
                
                var option = {
                    tooltip: {
                        trigger: 'axis'
                    },
                    legend: {
                        data: ['本期', '同期']
                    },
                    grid: {
                        left: '3%',
                        right: '4%',
                        bottom: '3%',
                        containLabel: true
                    },
                    xAxis: {
                        type: 'category',
                        boundaryGap: false,
                        data: data.x_axis
                    },
                    yAxis: {
                        type: 'value',
                        name: '营业额 (元)'
                    },
                    series: [
                        {
                            name: '本期',
                            type: 'line',
                            data: data.current_data,
                            smooth: true,
                            itemStyle: {
                                color: '#667eea'
                            },
                            areaStyle: {
                                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                    {offset: 0, color: 'rgba(102, 126, 234, 0.3)'},
                                    {offset: 1, color: 'rgba(102, 126, 234, 0.1)'}
                                ])
                            }
                        },
                        {
                            name: '同期',
                            type: 'line',
                            data: data.last_period_data,
                            smooth: true,
                            itemStyle: {
                                color: '#e74c3c'
                            },
                            areaStyle: {
                                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                    {offset: 0, color: 'rgba(231, 76, 60, 0.3)'},
                                    {offset: 1, color: 'rgba(231, 76, 60, 0.1)'}
                                ])
                            }
                        }
                    ]
                };

                
                chart.setOption(option);
            }
        },
        error: function() {
            console.error('获取趋势分析数据失败');
        }
    });
    
    // 响应式
    window.addEventListener('resize', function() {
        chart.resize();
    });
}

// 商品销量排行
function initSalesRankChart(period = 'day') {
    var chart = echarts.init(document.getElementById('salesRankChart'));
    
    // 先清空图表
    chart.clear();
    
    // 通过AJAX获取数据
    $.ajax({
        url: '/reports/api/sales-rank/',
        type: 'GET',
        data: { period: period },
        success: function(response) {
            if (response.code === '1') {
                var data = response.data;
                
                // 检查是否有数据
                var hasData = data.categories && data.categories.length > 0 && data.quantities && data.quantities.some(function(val) { return val > 0; });
                
                if (!hasData) {
                    showEmptyChart(chart, '暂无销量数据');
                    return;
                }
                
                var chartData = [];
                for (let i = 0; i < data.categories.length; i++) {
                    chartData.push({
                        value: data.quantities[i],
                        name: data.categories[i]
                    });
                }
                
                var option = {
                    tooltip: {
                        trigger: 'item'
                    },
                    legend: {
                        orient: 'vertical',
                        left: 'left'
                    },
                    series: [{
                        name: '销量',
                        type: 'pie',
                        radius: '70%',
                        data: chartData,
                        emphasis: {
                            itemStyle: {
                                shadowBlur: 10,
                                shadowOffsetX: 0,
                                shadowColor: 'rgba(0, 0, 0, 0.5)'
                            }
                        }
                    }]
                };
                
                chart.setOption(option);
            }
        },
        error: function() {
            console.error('获取商品销量排行数据失败');
        }
    });
    
    // 响应式
    window.addEventListener('resize', function() {
        chart.resize();
    });
}

// 会员复购率
function initRepurchaseRateChart(period = 'day') {
    var chart = echarts.init(document.getElementById('repurchaseRateChart'));
    
    // 先清空图表
    chart.clear();
    
    // 通过AJAX获取数据
    $.ajax({
        url: '/reports/api/repurchase-rate/',
        type: 'GET',
        data: { period: period },
        success: function(response) {
            if (response.code === '1') {
                var data = response.data;
                
                // 检查是否有数据
                var hasData = data.repurchase_rate && data.repurchase_rate.some(function(val) { return val > 0; });
                
                if (!hasData) {
                    showEmptyChart(chart, '暂无复购率数据');
                    return;
                }
                
                var option = {
                    tooltip: {
                        trigger: 'axis'
                    },
                    grid: {
                        left: '3%',
                        right: '4%',
                        bottom: '3%',
                        containLabel: true
                    },
                    xAxis: {
                        type: 'category',
                        boundaryGap: false,
                        data: data.x_axis
                    },
                    yAxis: {
                        type: 'value',
                        name: '复购率 (%)',
                        axisLabel: {
                            formatter: '{value}%'
                        }
                    },
                    series: [{
                        name: '复购率',
                        type: 'line',
                        data: data.repurchase_rate,
                        smooth: true,
                        itemStyle: {
                            color: '#9c27b0'
                        },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                {offset: 0, color: 'rgba(156, 39, 176, 0.3)'},
                                {offset: 1, color: 'rgba(156, 39, 176, 0.1)'}
                            ])
                        }
                    }]
                };
                
                chart.setOption(option);
            }
        },
        error: function() {
            console.error('获取会员复购率数据失败');
        }
    });
    
    // 响应式
    window.addEventListener('resize', function() {
        chart.resize();
    });
}

function get_data_overview(period){
      // 通过AJAX获取经营概览数据
    $.ajax({
        url: '/reports/api/overview/',
        type: 'GET',
        data: { period: period },
        success: function(response) {
            if (response.code === '1') {
                var data = response.data;
                var salesElement = document.querySelector('#salesLabel').parentElement.querySelector('h3');
                var ordersElement = document.querySelector('#ordersLabel').parentElement.querySelector('h3');
                var customersElement = document.querySelector('#customersLabel').parentElement.querySelector('h3');
                var grossMarginElement = document.querySelector('#grossMarginLabel').parentElement.querySelector('h3');
                
                // 格式化数据
                salesElement.textContent = '¥' + data.sales.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                ordersElement.textContent = data.orders.toLocaleString('zh-CN');
                customersElement.textContent = data.customers.toLocaleString('zh-CN');
                grossMarginElement.textContent = data.gross_margin.toFixed(1) + '%';
            }
        },
        error: function() {
            console.error('获取经营概览数据失败');
        }
    });
}


// 导出报表
function exportReport(type) {
    if (type === 'print') {
        // 添加打印前的准备
        addPrintStyles();
        
        // 延迟打印以确保样式生效
        setTimeout(() => {
            window.print();
            // 打印完成后恢复样式
            setTimeout(removePrintStyles, 100);
        }, 200);
    } else if (type === 'excel') {
        exportToExcel();
    }
}

// 导出Excel功能
function exportToExcel() {
    // 获取当前选中的报表类型
    var reportType = $('#reportType').val();
    var reportTypeName = $('#reportType option:selected').text();
    
    // 创建Excel工作簿
    var wb = XLSX.utils.book_new();
    
    // 获取当前日期
    var now = new Date();
    var dateStr = now.getFullYear() + 
                  String(now.getMonth() + 1).padStart(2, '0') + 
                  String(now.getDate()).padStart(2, '0');
    
    // 并行获取所有数据
    Promise.all([
        fetchOverviewData(reportType),
        fetchTrendData(reportType),
        fetchSalesRankData(reportType),
        fetchProfitRankData(reportType),
        fetchNewMembersData(reportType)
    ]).then(function(results) {
        // 创建各个Sheet
        createOverviewSheet(wb, results[0], reportTypeName);
        createTrendSheet(wb, results[1], reportTypeName);
        createSalesRankSheet(wb, results[2], reportTypeName);
        createProfitRankSheet(wb, results[3], reportTypeName);
        createNewMembersSheet(wb, results[4], reportTypeName);
        
        // 生成文件名
        var fileName = reportTypeName + '_' + dateStr + '.xlsx';
        
        // 下载Excel文件
        XLSX.writeFile(wb, fileName);
        
        showAlert('success', 'Excel导出成功！');
    }).catch(function(error) {
        console.error('导出失败:', error);
        showAlert('error', '导出失败：' + error.message);
    });
}

            success: function(response) {

                }

            error: function() {

// 创建经营概览Sheet
function createOverviewSheet(wb, data, reportTypeName) {
    var wsData = [
        ['经营概览'],
        [],
        ['指标', '数值'],
        ['营业额', '¥' + data.sales.toFixed(2)],
        ['订单数', data.orders],
        ['顾客数', data.customers],
        ['毛利率', data.gross_margin + '%']
    ];
    
    var ws = XLSX.utils.aoa_to_sheet(wsData);
    
    // 设置表头样式
    ws['A1'].s = { font: { bold: true, sz: 14 } };
    ws['A3'].s = { font: { bold: true } };
    ws['B3'].s = { font: { bold: true } };
    
    // 设置列宽

    XLSX.utils.book_append_sheet(wb, ws, '经营概览');
}

// 显示提示信息
function showAlert(type, message) {
    // 创建提示元素
    var alertDiv = document.createElement('div');
    alertDiv.style.cssText = 'position: fixed; top: 20px; right: 20px; padding: 15px 20px; border-radius: 8px; z-index: 9999; font-size: 14px; color: white;';
    
    if (type === 'success') {
        alertDiv.style.backgroundColor = '#27ae60';
    } else {
        alertDiv.style.backgroundColor = '#e74c3c';
    }
    
    alertDiv.textContent = message;
    document.body.appendChild(alertDiv);
    
    // 3秒后自动移除
    setTimeout(function() {
        alertDiv.remove();
    }, 3000);
}

// 添加打印样式
function addPrintStyles() {
    // 添加打印水印
    const printStyle = document.createElement('style');

    printStyle.id = 'print-styles';
    printStyle.innerHTML = `
        @media print {
            /* 打印页眉 */
     
            
            /* 打印页脚 */
            @page :footer {
                display: none;
            }
            
            @page :header {
                display: none;
            }
            
            /* 强制分页 */
            .page-break {
                page-break-after: always;
            }
            
            /* 优化图表打印 */
            .echarts {
                width: 100% !important;
                height: auto !important;
            }

           
        }

         #chart_fg{
                margin-top: 300px !important;
            }
    `;
    document.head.appendChild(printStyle);
}

// 移除打印样式
function removePrintStyles() {
    const printStyle = document.getElementById('print-styles');

    if (printStyle) {
        printStyle.remove();
    }
}
